name: NovaOS Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ROOT_DIR: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust targets
        run: |
          rustup target add \
            aarch64-unknown-none-softfloat \
            aarch64-unknown-uefi \
            x86_64-unknown-none

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lld llvm qemu-system-aarch64 qemu-efi-aarch64

      - name: Environment check
        run: ./scripts/novaos-env-check.sh

      - name: Local validation
        run: ./ci/validate-local.sh

      - name: Generate validation report
        run: ./scripts/novaos-report.sh

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: novaos-validation-reports
          path: artifacts/reports/
